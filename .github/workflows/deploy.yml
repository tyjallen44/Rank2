name: Deploy to Cloud Run

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  PROJECT_ID: rank2-499218
  REGION: us-central1
  SERVICE: rank2
  REPO: rank2
  IMAGE: us-central1-docker.pkg.dev/rank2-499218/rank2/app

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Write build version
        run: git rev-parse --short HEAD > VERSION

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build and push image
        run: |
          docker build -t ${{ env.IMAGE }}:${{ github.sha }} -t ${{ env.IMAGE }}:latest .
          docker push ${{ env.IMAGE }}:${{ github.sha }}
          docker push ${{ env.IMAGE }}:latest

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE }} \
            --image=${{ env.IMAGE }}:${{ github.sha }} \
            --region=${{ env.REGION }} \
            --platform=managed \
            --allow-unauthenticated \
            --memory=2Gi \
            --cpu=1 \
            --timeout=3600 \
            --min-instances=0 \
            --max-instances=2 \
            --set-env-vars="REPORTS_DIR=/data/reports,DB_PATH=/data/rank2.duckdb" \
            --set-secrets="ANTHROPIC_API_KEY=ANTHROPIC_API_KEY:latest,ACCESS_PASSWORD=ACCESS_PASSWORD:latest,OPENAI_API_KEY=OPENAI_API_KEY:latest" \
            --add-volume="name=rank2-data,type=cloud-storage,bucket=rank2-499218-rank2-data" \
            --add-volume-mount="volume=rank2-data,mount-path=/data" \
            --project=${{ env.PROJECT_ID }}

      - name: Show service URL
        run: |
          gcloud run services describe ${{ env.SERVICE }} \
            --region=${{ env.REGION }} \
            --format="value(status.url)" \
            --project=${{ env.PROJECT_ID }}
